services:
  model:
    build:
      context: .
      dockerfile: Dockerfile.vllm-xxhash
    image: llms-optimization/vllm-openai:v0.22.1-xxhash
    command:
      - --model=/model
      - --served-model-name=Qwen3.5-2B
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=262144
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --prefix-caching-hash-algo=xxhash
      - --kv-cache-dtype=fp8
