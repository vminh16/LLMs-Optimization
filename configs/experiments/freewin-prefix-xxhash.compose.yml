# Compose override for local prefix-cache hashing experiment.
# Use with: docker-compose -f docker-compose.local.yml -f configs/experiments/freewin-prefix-xxhash.compose.yml up model
services:
  model:
    command:
      - --model=/model #Don't change this to vllm-server
      - --served-model-name=Qwen3.5-2B #Don't change this to vllm-server
      - --host=0.0.0.0 #Don't change this to vllm-server
      - --port=8000 #Don't change this to vllm-server
      - --max-model-len=262144
      - --gpu-memory-utilization=0.95
      - --tensor-parallel-size=1
      - --enable-prefix-caching
      - --prefix-caching-hash-algo=xxhash
